<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Title Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --border: #222;
    --accent: #ff3c3c;
    --accent2: #ff7b00;
    --text: #f0f0f0;
    --muted: #555;
    --tag: #1a1a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image: 
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(255,60,60,0.08) 0%, transparent 70%);
  }

  .container {
    width: 100%;
    max-width: 660px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .yt-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .yt-icon svg { width: 18px; height: 18px; fill: white; }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    letter-spacing: -1.5px;
    background: linear-gradient(135deg, #fff 0%, #888 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  input[type="text"] {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  .model-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .model-btn {
    background: var(--tag);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .model-btn:hover { border-color: #444; color: var(--text); }

  .model-btn.active {
    background: rgba(255,60,60,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .gen-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    text-transform: uppercase;
  }

  .gen-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .gen-btn:active { transform: translateY(0); }
  .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Results */
  .results-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .results-card.show { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .results-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .results-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .title-item {
    background: #0e0e0e;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.2s;
  }

  .title-item:hover { border-color: #333; }
  .title-item:last-child { margin-bottom: 0; }

  .title-text {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    flex: 1;
  }

  .copy-btn {
    background: var(--tag);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .copy-btn:hover { border-color: #444; color: var(--text); }
  .copy-btn.copied { border-color: #2a7a2a; color: #4caf50; }

  .loader {
    display: flex;
    justify-content: center;
    padding: 20px;
    gap: 6px;
  }

  .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 0.8s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.15s; background: var(--accent2); }
  .dot:nth-child(3) { animation-delay: 0.3s; background: #ffd700; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-10px); }
  }

  .error-msg {
    color: var(--accent);
    font-size: 13px;
    text-align: center;
    padding: 12px;
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    margin-top: 24px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="yt-icon">
        <svg viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg>
      </div>
      <h1>Title Generator</h1>
    </div>
    <p class="subtitle">Powered by DeepSeek AI</p>
  </header>

  <div class="card">
    <label>Topic / Keyword</label>
    <div class="input-row">
      <input type="text" id="topicInput" placeholder="e.g. Python automation, travel vlog India..." />
    </div>

    <label>Model</label>
    <div class="model-row" id="modelRow">
      <button class="model-btn active" data-model="v3">v3</button>
      <button class="model-btn" data-model="r1">r1</button>
      <button class="model-btn" data-model="r1-0528">r1-0528</button>
      <button class="model-btn" data-model="coder">coder</button>
    </div>

    <button class="gen-btn" id="genBtn" onclick="generateTitles()">
      ⚡ Generate Titles
    </button>
  </div>

  <div class="results-card" id="resultsCard">
    <div class="results-label">Generated Titles</div>
    <div id="resultsBody"></div>
  </div>

  <footer>deepseek api · github pages · free forever</footer>
</div>

<script>
  const REAL_API = "https://tools-floating-uncle-socket.trycloudflare.com/v1/chat";
  const API_URL = "https://corsproxy.io/?" + encodeURIComponent(REAL_API);
  const API_KEY = "TURBO-2C82FE77";
  let selectedModel = "v3";

  // Model selector
  document.querySelectorAll('.model-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedModel = btn.dataset.model;
    });
  });

  // Enter key
  document.getElementById('topicInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateTitles();
  });

  async function generateTitles() {
    const topic = document.getElementById('topicInput').value.trim();
    if (!topic) {
      document.getElementById('topicInput').focus();
      return;
    }

    const btn = document.getElementById('genBtn');
    const card = document.getElementById('resultsCard');
    const body = document.getElementById('resultsBody');

    btn.disabled = true;
    btn.textContent = 'Generating...';
    card.classList.add('show');
    body.innerHTML = `<div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;

    const prompt = `Generate 5 catchy, viral YouTube video titles for the topic: "${topic}".

Rules:
- Each title on a new line
- Use numbers, power words, and curiosity hooks
- Mix different styles (how-to, listicle, story, shock, question)
- No explanations, just the 5 titles
- No numbering or bullet points`;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'X-Master-Key': API_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ prompt, model: selectedModel })
      });

      if (!res.ok) throw new Error(`API error: ${res.status}`);

      const data = await res.json();

      // Extract text from response
      let text = '';
      if (typeof data === 'string') text = data;
      else if (data.response) text = data.response;
      else if (data.choices?.[0]?.message?.content) text = data.choices[0].message.content;
      else if (data.content) text = data.content;
      else text = JSON.stringify(data);

      const titles = text.split('\n')
        .map(t => t.replace(/^[-•*\d.\s]+/, '').trim())
        .filter(t => t.length > 10);

      if (titles.length === 0) throw new Error('No titles received');

      body.innerHTML = titles.map(t => `
        <div class="title-item">
          <span class="title-text">${escapeHtml(t)}</span>
          <button class="copy-btn" onclick="copyTitle(this, '${escapeAttr(t)}')">Copy</button>
        </div>
      `).join('');

    } catch (err) {
      body.innerHTML = `<div class="error-msg">⚠ ${err.message}</div>`;
    }

    btn.disabled = false;
    btn.textContent = '⚡ Generate Titles';
  }

  function copyTitle(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escapeAttr(t) {
    return t.replace(/'/g, "\\'").replace(/"/g, '\\"');
  }
</script>
</body>
</html>
